name: ❓ Other
description: Create some other type of issue
body:
  - type: checkboxes
    attributes:
      label: Is an Issue Type Set?
      description: 'Choose a type for this issue: 🔧 build, 👷 ci, 📝 docs, ♻️ refactor, 🔒 security, 🎨 style, ✅ test.'
      options:
        - label: I've added a type to the issue (if possible)
          required: false
  - type: textarea
    attributes:
      label: What?
      description: Describe what you want to do.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why?
      description: What problem would this solve?
    validations:
      required: true
